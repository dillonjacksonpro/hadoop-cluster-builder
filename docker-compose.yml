services:
  hadoop-builder:
    build: .
    image: hadoop-cluster-builder
    stdin_open: true
    tty: true
    environment:
      # AWS credentials — sourced from your shell environment
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      # Cluster size: 1 = single node, N = 1 NameNode + (N-1) DataNodes
      - TF_VAR_cluster_size=${CLUSTER_SIZE:-3}
